<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 자리 배치 프로그램</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2 style="margin-bottom: 20px; color: #1e293b;">🪑 자리 배치 도우미</h2>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('student')">명단 관리</button>
                <button class="tab-btn" onclick="switchTab('seating')">배치 설정</button>
            </div>

            <div id="studentSettings" class="settings-section active">
                <p>학생 명단 (총 <span id="studentCount">0</span>명)</p>
                <textarea id="studentList" placeholder="이름을 엔터로 구분하여 입력하세요.&#10;예시:&#10;김철수&#10;이영희" rows="15"></textarea>
                <button class="action-btn" onclick="saveStudents()">명단 저장하기</button>
            </div>

            <div id="seatingSettings" class="settings-section">
                <div class="grid-inputs">
                    <div>
                        <label>가로(열) 칸 수</label>
                        <input type="number" id="cols" value="6" min="1" max="10">
                    </div>
                    <div>
                        <label>세로(행) 칸 수</label>
                        <input type="number" id="rows" value="5" min="1" max="10">
                    </div>
                </div>

                <div style="margin: 15px 0;">
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="checkbox" id="pairSeating" style="margin-right: 8px;">
                        두 명씩 짝꿍으로 묶어서 띄우기
                    </label>
                </div>

                <div class="advanced-section" style="margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 15px;">
                    <h3 onclick="toggleAdvanced()" style="cursor: pointer; color: #475569; display: flex; align-items: center; justify-content: space-between; margin-bottom: 0; font-size: 1rem; padding: 10px; background-color: #f8fafc; border-radius: 6px; border: 1px solid #e2e8f0;">
                        <span>🔒 고급 배치 조건 (선택 사항)</span>
                        <span id="advancedIcon">▼</span>
                    </h3>
                    
                    <div id="advancedContent" style="display: none; margin-top: 15px; font-size: 0.9rem;">
                        <p style="margin-bottom: 5px;">📍 고정석 지정 (형식: 이름,행,열)</p>
                        <textarea id="fixedSeatsInput" placeholder="예) 홍길동,1,2&#10;빈 자리,6,6" rows="2" style="width: 100%; margin-bottom: 10px;"></textarea>
                        
                        <p style="margin-bottom: 5px;">❌ 거리두기 학생 (서로 인접 금지)</p>
                        <textarea id="separateInput" placeholder="예) 김철수,박민지" rows="2" style="width: 100%; margin-bottom: 10px;"></textarea>
                        
                        <p style="margin-bottom: 5px;">🤝 무조건 짝꿍 (바로 옆/앞뒤 배치)</p>
                        <textarea id="pairInput" placeholder="예) 정명훈,오지민" rows="2" style="width: 100%; margin-bottom: 10px;"></textarea>
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0;">

                <div class="action-buttons">
                    <button class="action-btn primary" onclick="generateSeating()">조건 반영 랜덤 배치</button>
                    
                    <div style="display: flex; gap: 10px; margin-top: 15px; align-items: center;">
                        <input type="number" id="groupSize" value="4" min="2" max="8" style="width: 60px;">
                        <span>명씩</span>
                        <button class="action-btn" onclick="generateGroups()" style="flex: 1;">랜덤 모둠 짜기</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="view-controls">
                <button id="viewStudent" class="view-btn active" onclick="togglePerspective('student')">학생 시점 (앞에서 보기)</button>
                <button id="viewTeacher" class="view-btn" onclick="togglePerspective('teacher')">교사 시점 (뒤에서 보기)</button>
            </div>

            <div class="classroom">
                <div id="podiumTop" class="podium">칠판 / 교 탁</div>
                <div id="resultArea">
                    <div style="color: #94a3b8; text-align: center; margin-top: 50px;">
                        왼쪽 패널에서 설정을 완료하고 '조건 반영 랜덤 배치'를 눌러주세요.
                    </div>
                </div>
                <div id="podiumBottom" class="podium hidden">칠판 / 교 탁</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
