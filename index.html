<div class="advanced-section" style="margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 15px;">
    
    <h3 onclick="toggleAdvanced()" style="cursor: pointer; color: #475569; display: flex; align-items: center; justify-content: space-between; margin-bottom: 0;">
        <span>🔒 고급 배치 조건 (선택 사항)</span>
        <span id="advancedIcon">▼</span>
    </h3>
    
    <div id="advancedContent" style="display: none; margin-top: 15px;">
        <p>📍 고정석 지정 (형식: 이름,행,열)</p>
        <textarea id="fixedSeatsInput" placeholder="예) 홍길동,1,2&#10;빈 자리,6,6" rows="3" style="width: 100%; margin-bottom: 10px;"></textarea>
        
        <p>❌ 거리두기 학생 (서로 인접 금지)</p>
        <textarea id="separateInput" placeholder="예) 김철수,박민지" rows="3" style="width: 100%; margin-bottom: 10px;"></textarea>
        
        <p>🤝 무조건 짝꿍 (바로 옆/앞뒤 배치)</p>
        <textarea id="pairInput" placeholder="예) 정명훈,오지민" rows="3" style="width: 100%; margin-bottom: 10px;"></textarea>
    </div>

</div>
